<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>抹茶柚子巴斯克線上訂購 - 泡泡牛甜點</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        window.products = [
    {
        "id": 9,
        "group": "抹茶柚子巴斯克",
        "url": "mcyobsk.html",
        "name": "抹茶柚子巴斯克 (6吋切片)",
        "weight": "115g",
        "price": 140,
        "note": "缺貨"
    },
    {
        "id": 10,
        "group": "抹茶柚子巴斯克",
        "url": "mcyobsk.html",
        "name": "抹茶柚子巴斯克 (6吋整顆)",
        "weight": "690g",
        "price": 840,
        "note": "需5~7天出貨"
    }
];
        window.allProductsLookup = {"1":100,"2":125,"3":125,"4":125,"5":110,"6":130,"7":130,"8":130,"9":140,"10":840};
    </script>
    <style>
        .flavor-img-box { width: 4rem; height: 4rem; background-color: #f5f5f4; border-radius: 0.75rem; overflow: hidden; flex-shrink: 0; box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05); cursor: zoom-in; }
        .flavor-img-box img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 font-sans min-h-screen pb-24">
    <div class="max-w-2xl mx-auto bg-white shadow-md md:rounded-2xl my-0 md:my-8">
        <div class="p-4 flex justify-between items-center border-b sticky top-0 bg-white/90 backdrop-blur-md z-40 md:rounded-t-2xl">
            <a href="index.html" class="text-stone-600 hover:text-stone-900 font-medium text-sm flex items-center gap-1 py-1">← 返回首頁</a>
            <a href="cart.html" class="bg-amber-700 hover:bg-amber-800 text-white font-medium py-1.5 px-3.5 rounded-xl transition flex items-center gap-1.5 shadow-sm text-sm">🛒 購物車 (<span id="cart-count">0</span>)</a>
        </div>
        <div class="w-full min-w-full aspect-square flex items-center justify-center bg-stone-100 shrink-0 relative overflow-hidden">
            <img src="images/mcyobsk.png" alt="抹茶柚子巴斯克" class="w-full h-full object-cover" draggable="false">
        </div>
        <div class="p-6">
            <div class="mb-6">
                <h1 class="text-2xl font-bold text-stone-800 mb-2">抹茶柚子巴斯克</h1>
                <p class="text-stone-500 text-sm leading-relaxed">日本小山園抹茶的成熟微苦，撞上嚴選柚子的清新果香，濃郁綿密。宇治抹茶控必吃！</p>
            </div>
            <div id="cookie-list" class="space-y-3 mb-8"></div>
            <div class="bg-amber-50 rounded-2xl p-4 border border-amber-100 flex justify-between items-center flex-wrap gap-4 shadow-sm">
                <div class="flex flex-col">
                    <span class="text-xs font-semibold text-amber-700 block mb-0.5">目前訂單累計總額 (含其他分頁)</span>
                    <span class="text-3xl font-extrabold text-amber-700">NT$ <span id="entire-cart-total">0</span></span>
                    <p id="free-shipping-tip" class="text-xs font-medium text-stone-500 mt-1"></p>
                </div>
                <button onclick="saveToCartAndGo()" class="h-12 px-6 bg-amber-700 hover:bg-amber-800 text-white font-medium rounded-xl transition shadow-md flex items-center justify-center gap-1 active:scale-95 text-xm h-auto md:h-12">前往結帳</button>
            </div>
        </div>
    </div>
    <script>
        var cart = JSON.parse(localStorage.getItem("poponew_cart")) || {};
        var container = document.getElementById("cookie-list");
        window.products.forEach(function(p) {
            var currentQty = cart[p.id] || 0;
            var itemDiv = document.createElement("div");
            itemDiv.className = "flex items-center justify-between p-4 bg-stone-50 rounded-xl border border-stone-200 hover:border-amber-200 transition";
            var noteHtml = p.note ? " <span class='text-xs text-amber-600 font-semibold bg-amber-100/60 px-1.5 py-0.5 rounded-md ml-1'>" + p.note + "<\/span>" : "";
            var isOutOfStock = (p.note && (p.note.indexOf("缺貨") !== -1 || p.note.indexOf("售完") !== -1));
            var actionHtml = isOutOfStock ? "<span class='text-sm font-bold text-stone-400 bg-stone-100 px-3 py-1.5 rounded-lg border border-stone-200 shadow-inner'>🚫 已售完<\/span>" : "<div class='flex items-center gap-3'><button type='button' onclick='updateQty(" + p.id + ", -1)' class='w-8 h-8 rounded-lg border bg-white flex items-center justify-center font-bold shadow-sm'>-<\/button><input type='number' id='qty-" + p.id + "' value='" + currentQty + "' min='0' readonly class='w-6 text-center bg-transparent font-bold'><button type='button' onclick='updateQty(" + p.id + ", 1)' class='w-8 h-8 rounded-lg border bg-white flex items-center justify-center font-bold shadow-sm'>+<\/button><\/div>";
            itemDiv.innerHTML = "<div><h3 class='font-medium text-stone-800 text-sm'>" + p.name + noteHtml + "<\/h3><p class='text-xs text-stone-400 mt-0.5'>約 " + p.weight + "<\/p><p class='text-sm text-amber-700 font-semibold mt-0.5'>NT$ " + p.price + "<\/p><\/div>" + actionHtml;
            container.appendChild(itemDiv);
        });
        function updateQty(id, change) { var input = document.getElementById("qty-" + id); var currentQty = parseInt(input.value) || 0; currentQty = Math.max(0, currentQty + change); input.value = currentQty; if (currentQty === 0) { delete cart[id]; } else { cart[id] = currentQty; } localStorage.setItem("poponew_cart", JSON.stringify(cart)); calculatePageTotal(); updateCartCount(); }
        function calculatePageTotal() { var entireCartTotal = 0; for (var id in cart) { entireCartTotal += (window.allProductsLookup[id] || 0) * cart[id]; } document.getElementById("entire-cart-total").innerText = entireCartTotal; var tipElement = document.getElementById("free-shipping-tip"); if (entireCartTotal === 0) { tipElement.innerText = "⚠️ 本商店最低結帳金額為 NT$ 500 元唷！"; } else if (entireCartTotal >= 2000) { tipElement.innerHTML = "<span class='text-green-600 font-bold text-sm'>🎉 全店已達免運費門檻！直接結帳超划算！</span>"; } else { tipElement.innerText = "還差" + (2000 - entireCartTotal) + " 元就免運啦！"; } }
        function saveToCartAndGo() { var entireCartTotal = 0; for (var id in cart) { entireCartTotal += (window.allProductsLookup[id] || 0) * cart[id]; } if (entireCartTotal === 0) { alert("您目前尚未選擇任何數量唷！"); return; } if (entireCartTotal < 500) { alert("抱歉！本商店最低結帳金額為 NT$ 500 元，目前綜合累計為 NT$ " + entireCartTotal + " 元，請再多選購一些甜點唷！"); return; } localStorage.setItem("poponew_cart", JSON.stringify(cart)); window.location.href = "cart.html"; }
        function updateCartCount() { var count = 0; for (var id in cart) { count += cart[id]; } document.getElementById("cart-count").innerText = count; }
        calculatePageTotal(); updateCartCount();
        (function() {
            window.products.forEach(function(p) {
                var imgUrl = "images/thumb/" + p.id + ".png";
                var imgTester = new Image();
                imgTester.onload = function() {
                    var itemDivs = container.children;
                    for (var i = 0; i < itemDivs.length; i++) {
                        var d = itemDivs[i];
                        if (d.innerHTML.indexOf("updateQty(" + p.id + ",") !== -1 || d.innerHTML.indexOf("🚫 已售完") !== -1) {
                            var leftPart = d.children[0];
                            leftPart.className = "flex gap-3 items-center";
                            var imgBox = document.createElement("div");
                            imgBox.className = "flavor-img-box";
                            imgBox.innerHTML = "<img src='" + imgUrl + "' onclick='window.openFlavorLightbox(this.src)'>";
                            leftPart.insertBefore(imgBox, leftPart.firstChild);
                            break;
                        }
                    }
                };
                imgTester.src = imgUrl;
            });
            var lb = document.createElement("div");
            lb.className = "fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center p-4 z-50 opacity-0 pointer-events-none transition-all duration-300 cursor-zoom-out";
            lb.innerHTML = "<img id='lb-img' class='max-w-full max-h-[85vh] rounded-2xl shadow-2xl border-4 border-white/10 transform scale-95 transition-all duration-300'>";
            lb.onclick = function() { lb.classList.add("opacity-0", "pointer-events-none"); lb.querySelector("img").classList.add("scale-95"); };
            document.body.appendChild(lb);
            window.openFlavorLightbox = function(src) {
                var img = document.getElementById("lb-img"); img.src = src;
                lb.classList.remove("opacity-0", "pointer-events-none");
                setTimeout(function() { img.classList.remove("scale-95"); }, 10);
            };
        })();
    </script>
</body>
</html>
