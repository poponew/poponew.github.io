<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泡泡牛-手做甜點</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 text-stone-800 font-sans min-h-screen pb-12">

    <nav class="bg-white shadow-sm sticky top-0 z-50 px-6 py-4 flex justify-between items-center border-b border-stone-100">
        <span class="text-xl font-bold text-amber-800 tracking-wider"></span>
        <a href="cart.html" class="bg-amber-700 hover:bg-amber-800 text-white font-medium py-2 px-4 rounded-xl transition flex items-center gap-2 shadow-sm">
            🛒 我的購物車 (<span id="cart-count">0</span>)
        </a>
    </nav>

    <div class="max-w-5xl mx-auto px-4 my-8">
        <header class="text-center py-10 bg-white rounded-2xl shadow-sm border border-stone-100 mb-8">
            <h1 class="text-4xl font-extrabold text-amber-800 tracking-wider">泡泡牛手做甜點</h1>
            <p class="text-stone-500 mt-3 max-w-xl mx-auto text-sm px-4">全店手工現做，滿 NT$ 2,000 元即享免運費宅配！</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="product-list"></div>
    </div>
<!-- 店家資訊區塊 (置於商品列表下方) -->
<!-- 店家資訊區塊 (與商品頁一致的左對齊排版) -->
<footer class="max-w-2xl mx-auto px-4 pb-12">
    <div class="bg-white shadow-md rounded-2xl p-5 flex items-center gap-4 border border-stone-100 mt-8">
        <!-- 縮圖區塊 -->
        <img src="images/poponew.jpg" alt="泡泡牛" 
             class="w-[84px] h-[84px] object-cover rounded-xl flex-shrink-0 cursor-zoom-in shadow-sm border border-stone-200 hover:opacity-90 transition" 
             onclick="window.openFlavorLightbox(this.src)">
        
        <!-- 文字資訊區塊 (維持左對齊) -->
        <div class="text-left">
            <h4 class="font-bold text-amber-700 text-sm md:text-base mb-1">泡泡牛·手做甜點·黑糖珍珠</h4>
            <p class="text-stone-500 text-[11px] md:text-xs leading-relaxed">
                地址：高雄市三民區自由一路8巷10號<br>
                服務專線：0900-769880<br>
                e-mail: <a href="mailto:hi.poponew@gmail.com" class="text-blue-600 hover:underline">hi.poponew@gmail.com</a>
            </p>
        </div>
    </div>
    <p class="text-center text-stone-400 text-[10px] md:text-[11px] py-6">Copyright &copy; 2026 泡泡牛. All rights reserved.</p>
</footer>

    <script>
const products = [
    {
        id: "group-1",
        name: "美式軟餅乾系列",
        price: "100 起",
        img: "images/msbg.png",
        desc: "如果說法式甜點是精雕細琢的藝術品，那麼美式軟餅乾，就是生活中最溫暖厚實的擁抱。<br/>​我們以此為靈感，悉心復刻了紐約 Levain Bakery 的代表作 — Chocolate Chip Walnut Cookie。<br/>巧克力的微苦與核桃的溫潤堅果香，向來是烘焙界無需多言的絕配。在厚實、不規則的外表下，藏著極致的外酥內軟。<br/>​​微微加熱後，流淌的巧克力流心讓人驚豔；而冷藏過後的緊實風味，同樣出眾。沒有繁複的裝飾，只有純粹的美味。在每一個需要被撫慰的日常瞬間，為你補充最滿的能量。",
        url: "msbg.html"
    },
    {
        id: "group-2",
        name: "抹茶柚子巴斯克",
        price: "140 起",
        img: "images/mcyobsk.png",
        desc: "悶熱的夏天需要一點清爽的溫柔。<br/>抹​茶柚子巴斯克<br/>​抹茶的微苦，遇上柚子的清甜，在舌尖優雅地化開。<br/>獨特的軟心質地，綿密順滑如雲朵般細緻。<br/>​每一口，都是剛剛好的甜，和撫平浮躁的高級大人味。",
        url: "mcyobsk.html"
    },
    {
        id: "group-3",
        name: "焙茶/鐵觀音巴斯克",
        price: "140 起",
        img: "images/bcbsk.png",
        desc: "靜靜落入窗邊的午後陽光，最適合留給一口濃郁的茶香。<br/>​今天想和大家分享這款復刻的超人氣美味「焙茶軟心巴斯克」。如果你也著迷於香港 Hemma Cafe 每天大排長龍、讓人心甘情願等待的 Hojicha Basque，那你一定不能錯過這個味道。<br/>​我們特別選用的優質焙茶粉，一入口，率先迎來的是外層迷人的微焦香氣，隨之而來的是絲滑、醇厚的軟心質地。焙茶獨特的煙燻茶韻在舌尖緩緩散開，那是焦香與茶香的完美碰撞。<br/>​這樣綿密而深邃的滋味，彷彿有一種神奇的魔力。吃下一口，今天的煩惱好像就被溫柔地治癒了。",
        url: "bcbsk.html"
    },
];


        const listContainer = document.getElementById('product-list');
        products.forEach(p => {
            listContainer.innerHTML += `
                <a href="${p.url}" class="bg-white rounded-2xl shadow-md overflow-hidden border border-stone-100 flex flex-col justify-between hover:shadow-lg hover:-translate-y-0.5 transition duration-200 block group">
                    <div class="h-48 bg-stone-200 overflow-hidden">
                        <img src="${p.img}" alt="${p.name}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                    </div>
                    <div class="p-5 flex-grow flex flex-col justify-between">
                        <div>
                            <h2 class="text-lg font-bold text-stone-800 mb-1 group-hover:text-amber-800 transition">${p.name}</h2>
                            <p class="text-stone-500 text-xs leading-relaxed mb-4 line-clamp-2 min-h-[2.5rem]">${p.desc}</p>
                        </div>
                        <div class="pt-3 border-t border-stone-100 flex justify-between items-center">
                            <span class="text-sm text-stone-400">售價 <span class="text-base font-bold text-amber-700">NT$ ${p.price}</span></span>                            
                        </div>
                    </div>
                </a>
            `;
        });

        function updateCartCount() {
            let cart = JSON.parse(localStorage.getItem('poponew_cart')) || {};
            const count = Object.values(cart).reduce((sum, qty) => sum + qty, 0);
            document.getElementById('cart-count').innerText = count;
        }
        
        updateCartCount();
    </script>
    <script>
    // 初始化燈箱功能
    (function() {
        var lb = document.createElement("div");
        lb.className = "fixed inset-0 bg-black/80 z-[100] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 backdrop-blur-sm";
        lb.innerHTML = "<img id='lb-img' class='max-w-[90vw] max-h-[85vh] rounded-2xl shadow-2xl transform scale-95 transition-all duration-300'>";
        lb.onclick = function() { lb.classList.add("opacity-0", "pointer-events-none"); lb.querySelector("img").classList.add("scale-95"); };
        document.body.appendChild(lb);
        window.openFlavorLightbox = function(src) {
            var img = document.getElementById("lb-img"); img.src = src;
            lb.classList.remove("opacity-0", "pointer-events-none");
            setTimeout(function() { img.classList.remove("scale-95"); }, 10);
        };
    })();
</script>
</body>
</html>
