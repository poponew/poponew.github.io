<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>泡泡牛甜點 - 購物車結帳</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            emailjs.init("plo9UwCdQBE-7lT18");
        })();
    </script>
</head>
<body class="bg-stone-50 text-stone-800 font-sans min-h-screen pb-24">

    <div class="max-w-2xl mx-auto bg-white shadow-lg md:rounded-2xl overflow-hidden my-0 md:my-8 p-5 flex flex-col min-h-[90vh]">
        <a href="index.html" class="text-amber-800 hover:text-amber-900 font-medium text-sm mb-5 inline-flex items-center gap-1 py-1">
            ← 返回繼續選購甜點
        </a>
        
        <h1 class="text-xl font-bold text-stone-800 border-b pb-3 mb-5 flex items-center gap-2">
            🛒 您的購物清單
        </h1>

        <div id="cart-items" class="space-y-3 mb-5"></div>

        <div class="p-4 bg-amber-50 rounded-xl border border-amber-100 mb-5 space-y-2 text-sm">
            <div class="flex justify-between">
                <span class="text-stone-600">商品小計：</span>
                <span class="font-bold text-stone-800">NT$ <span id="subtotal-price">0</span></span>
            </div>
            <div class="flex justify-between">
                <span class="text-stone-600">冷凍宅配運費：</span>
                <span class="font-bold text-stone-800" id="shipping-fee-text">NT$ 80</span>
            </div>
            <div class="flex justify-between items-center pt-2 border-t border-amber-200 text-base">
                <span class="font-medium text-amber-900">總計金額：</span>
                <span class="text-xl font-bold text-amber-700">NT$ <span id="total-price">0</span></span>
            </div>
            <p id="free-shipping-tip" class="text-xs text-amber-600 text-right font-medium pt-1"></p><p id="bulk-order-tip" class="hidden text-xs text-red-600 font-bold pt-1"></p>
        </div>

        <form id="orderForm" onsubmit="submitOrder(event)" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-stone-600 mb-1">姓名 <span class="text-red-500">*</span></label>
                    <input type="text" id="name" required class="w-full h-11 px-4 border border-stone-300 rounded-xl focus:ring-2 focus:ring-amber-500 focus:outline-none text-base">
                </div>
                <div>
                    <label class="block text-sm font-medium text-stone-600 mb-1">手機號碼 <span class="text-red-500">*</span></label>
                    <input type="tel" id="phone" required pattern="^09\d{8}$" placeholder="例如: 0912345678" class="w-full h-11 px-4 border border-stone-300 rounded-xl focus:ring-2 focus:ring-amber-500 focus:outline-none text-base">
                </div>
            </div>

            <p class="text-xs text-red-500 font-medium mb-1.5 flex items-center gap-1">
                ⚠️ 目前僅限台灣本島冷凍寄送，暫不開放離島區域，敬請見諒。
            </p>
            
            <div class="grid grid-cols-2 gap-4 bg-stone-50 p-3 rounded-xl border border-stone-200">
                <div>
                    <label class="block text-xs font-medium text-stone-500 mb-1">收件縣市 <span class="text-red-500">*</span></label>
                    <select id="county-select" onchange="onCountyChange()" required class="w-full h-10 px-2 border border-stone-300 rounded-lg bg-white focus:outline-none text-sm">
                        <option value="">請選擇縣市</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-medium text-stone-500 mb-1">收件區域 (郵遞區號) <span class="text-red-500">*</span></label>
                    <select id="district-select" onchange="onDistrictChange()" required class="w-full h-10 px-2 border border-stone-300 rounded-lg bg-white focus:outline-none text-sm">
                        <option value="">請先選擇縣市</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-stone-600 mb-1">收件詳細地址 <span class="text-red-500">*</span></label>
                <input type="text" id="address" required class="w-full h-11 px-4 border border-stone-300 rounded-xl focus:ring-2 focus:ring-amber-500 focus:outline-none text-base" placeholder="請填寫路名、巷弄、門牌與樓層">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-stone-600 mb-1">Email <span class="text-red-500">*</span></label>
                <input type="email" id="email" required class="w-full h-11 px-4 border border-stone-300 rounded-xl focus:ring-2 focus:ring-amber-500 focus:outline-none text-base">
            </div>

            <div class="bg-stone-50 p-4 rounded-xl border border-stone-200 space-y-3">
                <label class="block text-sm font-semibold text-stone-700 border-b border-stone-200 pb-1">付款方式 <span class="text-red-500">*</span></label>
                <p class="text-xs text-amber-700 mt-2 mb-1">
    💡 貼心提醒：單筆訂單金額達 NT$2,000 以上時，將不提供貨到付款服務，系統會自動隱藏貨到付款選項。
</p>
                <div class="flex gap-6 text-base py-1">
                    <label class="flex items-center gap-2 cursor-pointer select-none">
                        <input type="radio" name="payment_method" value="轉帳匯款" checked onchange="togglePaymentInfo(this.value)" class="w-4 h-4 text-amber-700">
                        <span>銀行轉帳匯款</span>
                    </label>
                    <label id="cod-option" class="flex items-center gap-2 cursor-pointer select-none">
                        <input type="radio" name="payment_method" value="貨到付款" onchange="togglePaymentInfo(this.value)" class="w-4 h-4 text-amber-700">
                        <span>貨到付款</span>
                    </label>
                </div>

                <div id="transfer-info" class="bg-white p-3 rounded-lg border border-stone-100 text-xs text-stone-600 space-y-2">
                    <div class="bg-stone-50 p-2.5 rounded-lg border border-stone-200 flex justify-between items-center flex-wrap gap-2">
                        <div>
                            <p class="font-medium text-amber-900 text-sm">🏦 中國信託 (822)</p>
                            <p class="text-stone-700 font-mono text-sm mt-0.5" id="bank-account-num">439540154414</p>
                            <p class="text-stone-500">戶名：吳宥蒼</p>
                        </div>
                        <button type="button" onclick="copyAccount()" class="bg-stone-200 hover:bg-stone-300 text-stone-700 px-3 py-1.5 rounded-md font-medium transition active:scale-95">
                            📋 複製帳號
                        </button>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-stone-700 mb-1">請輸入您的轉帳帳號後五碼 <span class="text-red-500">*</span></label>
                        <input type="text" id="account_last_five" placeholder="例如: 12345" class="w-full md:w-1/2 h-9 px-3 border border-stone-300 rounded-md focus:outline-none text-base">
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-stone-600 mb-1">備註欄位</label>
                <textarea id="note" rows="2" class="w-full p-3 border border-stone-300 rounded-xl focus:outline-none text-base" placeholder="有什麼想告訴我們的嗎？（本店免用統一發票，若需要收據請於此處備註唷！）"></textarea>
            </div>

            
            <div class="flex items-center gap-2 bg-stone-50 p-3 rounded-xl border">
                <input type="checkbox" id="not-robot" required class="w-4 h-4">
                <label for="not-robot" class="text-sm">我不是機器人</label>
            </div>

            <button type="submit" id="submit-btn" class="w-full h-12 bg-amber-700 hover:bg-amber-800 text-white font-medium rounded-xl transition shadow-md mt-4 text-base">
                確認送出訂單
            </button>
        </form>
    </div>

        const productsLookup = {
            "1": { name: "經典核桃美式軟餅乾", weight: "120g", price: 100 },
            "2": { name: "草莓棉花糖核桃巧克力軟餅乾", weight: "120g", price: 125 },
            "3": { name: "杏仁片棉花糖苦甜巧克力", weight: "120g", price: 125 },

            "5": { name: "醇黑榛果巧克力", weight: "120g", price: 110 },
            "6": { name: "柑橘奶酪", weight: "160g", price: 130 },
            "7": { name: "經典Oreo奶酪", weight: "160g", price: 130 },
            "8": { name: "酸甜綜合莓果奶酪", weight: "160g", price: 130 },
            "9": { name: "抹茶柚子巴斯克 (6吋切片)", weight: "115g", price: 140 },
            "10": { name: "抹茶柚子巴斯克 (6吋整顆)", weight: "690g", price: 840 },
        };

        let cart = JSON.parse(localStorage.getItem('poponew_cart')) || {};
        let productSubtotal = 0;
        let shippingFee = 80;

        const countySelect = document.getElementById('county-select');
        const districtSelect = document.getElementById('district-select');
        let selectedZip = "";

        // 用內建資料初始化縣市
        function initTwZipcode() {
            countySelect.innerHTML = '<option value="">請選擇縣市</option>';
            for (const county in twZipData) {
                countySelect.innerHTML += `<option value="${county}">${county}</option>`;
            }
            districtSelect.innerHTML = '<option value="">請先選擇縣市</option>';
        }

        // 當縣市改變時，動態帶入區域與郵遞區號
        function onCountyChange() {
            const county = countySelect.value;
            districtSelect.innerHTML = '<option value="">請選擇區域</option>';
            selectedZip = "";
            
            if (!county || !twZipData[county]) return;

            const districts = twZipData[county];
            for (const [distName, zipCode] of Object.entries(districts)) {
                districtSelect.innerHTML += `<option value="${distName}" data-zip="${zipCode}">${zipCode} ${distName}</option>`;
            }
        }

        function onDistrictChange() {
            const selectedOption = districtSelect.options[districtSelect.selectedIndex];
            selectedZip = selectedOption.getAttribute('data-zip') || "";
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            container.innerHTML = '';
            productSubtotal = 0;
            let hasItems = false;

            for (const [id, qty] of Object.entries(cart)) {
                if (qty <= 0) continue;
                hasItems = true;
                const p = productsLookup[id];
                if (!p) continue;

                productSubtotal += p.price * qty;

                container.innerHTML += `
                    <div class="flex items-center justify-between p-3 bg-stone-50 rounded-xl border border-stone-200">
                        <div class="pr-2">
                            <h3 class="font-medium text-stone-800 text-sm">${p.name}</h3>
                            <p class="text-[12px] text-stone-400 mt-0.5"> 約 ${p.weight || '120g'}</p>
                            <p class="text-xs text-amber-700 font-semibold mt-0.5">NT$ ${p.price} x ${qty}</p>
                        </div>
                        <div class="flex items-center gap-3 shrink-0">
                            <button type="button" onclick="changeQty('${id}', -1)" class="w-8 h-8 rounded-lg border bg-white flex items-center justify-center font-bold text-base shadow-sm active:bg-stone-100">-</button>
                            <span class="w-5 text-center text-sm font-semibold">${qty}</span>
                            <button type="button" onclick="changeQty('${id}', 1)" class="w-8 h-8 rounded-lg border bg-white flex items-center justify-center font-bold text-base shadow-sm active:bg-stone-100">+</button>
                        </div>
                    </div>
                `;
            }

            if (!hasItems) {
                container.innerHTML = `<p class="text-center text-stone-400 py-8 text-sm">您的購物車空空的唷！</p>`;
                document.getElementById('submit-btn').disabled = true;
                document.getElementById('submit-btn').classList.add('bg-stone-300', 'cursor-not-allowed');
            } else {
                document.getElementById('submit-btn').disabled = false;
                document.getElementById('submit-btn').classList.remove('bg-stone-300', 'cursor-not-allowed');
            }

            if (productSubtotal >= 2000) {
                shippingFee = 0;
                document.getElementById('shipping-fee-text').innerHTML = `<span class="text-green-600 font-bold">🎉 免運費</span>`;
                document.getElementById('free-shipping-tip').innerText = `已達 NT$ 2,000 免運門檻！`;
            } else {
                shippingFee = 80;
                document.getElementById('shipping-fee-text').innerText = `NT$ 80`;
                document.getElementById('free-shipping-tip').innerText = `再買 NT$ ${2000 - productSubtotal} 元即享免運費宅配！`;
            }

            
            const bulkTip=document.getElementById('bulk-order-tip');
            if(productSubtotal>5000){
                bulkTip.classList.remove('hidden');
                bulkTip.innerText='您的訂購數量較大，屬於大宗/企業訂單。為了保障您的權益與確認出貨檔期，請直接透過網站下方聯絡方式聯繫我們由專人為您服務！';
            } else {bulkTip.classList.add('hidden');}
            const cod=document.getElementById('cod-option');
            if(productSubtotal>2000){
                cod.style.display='none';
                document.querySelector('input[value="轉帳匯款"]').checked=true;
            } else {cod.style.display='flex';}
document.getElementById('subtotal-price').innerText = productSubtotal;
            document.getElementById('total-price').innerText = productSubtotal + shippingFee;
        }

        function changeQty(id, change) {
            cart[id] = (cart[id] || 0) + change;
            if(cart[id]>20){cart[id]=20; alert('單品數量上限為20');}
            if (cart[id] <= 0) delete cart[id];
            localStorage.setItem('poponew_cart', JSON.stringify(cart));
            renderCart();
        }

        function copyAccount() {
            const accountNum = document.getElementById('bank-account-num').innerText;
            navigator.clipboard.writeText(accountNum).then(() => {
                alert('已成功複製帳號：' + accountNum);
            });
        }

        function togglePaymentInfo(method) {
            const transferInfo = document.getElementById('transfer-info');
            const lastFiveInput = document.getElementById('account_last_five');
            if (method === '轉帳匯款') {
                transferInfo.classList.remove('hidden');
                lastFiveInput.required = true;
            } else {
                transferInfo.classList.add('hidden');
                lastFiveInput.required = false;
            }
        }

function submitOrder(event) {
            event.preventDefault();
            
            const phoneInput = document.getElementById('phone');
            const phoneValue = phoneInput.value.trim();
            const phonePattern = /^09\d{8}$/;
            
            if (!phonePattern.test(phoneValue)) {
                alert('❌ 請輸入正確的台灣手機號碼格式（例如：0912345678）');
                phoneInput.focus();
                return;
            }

            if (!countySelect.value || !districtSelect.value || !selectedZip) {
                alert('❌ 請選擇完整的收件縣市與區域！');
                countySelect.focus();
                return;
            }

            if(!document.getElementById('not-robot').checked){alert('請勾選我不是機器人');return;}
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerText = "訂單送出中...";

            let orderDetailsText = "";
            for (const [id, qty] of Object.entries(cart)) {
                const p = productsLookup[id];
                if (p) orderDetailsText += `${p.name} (約 ${p.weight || '120g'}) x ${qty} (NT$ ${p.price * qty})\n`;
            }
            orderDetailsText += `冷凍宅配運費：NT$ ${shippingFee}\n`;

            // 組合完整的地址字串傳給原本的 customer_address
            const fullCombinedAddress = `[${selectedZip}] ${countySelect.value}${districtSelect.value} ${document.getElementById('address').value}`;

            // ⚡ 安全防護罩：抓取付款方式，若為空不當掉改填"未選擇"
            let paymentMethodValue = "未選擇";
            const checkedPayment = document.querySelector('input[name="payment_method"]:checked');
            if (checkedPayment) {
                paymentMethodValue = checkedPayment.value;
            }

            const templateParams = {
                customer_name: document.getElementById('name').value,
                customer_phone: phoneValue,
                customer_address: fullCombinedAddress, 
                customer_email: document.getElementById('email').value,
                payment_method: paymentMethodValue,
                account_last_five: document.getElementById('account_last_five').value || "貨到付款",
                customer_note: document.getElementById('note').value || "無",
                order_details: orderDetailsText,
                total_price: productSubtotal + shippingFee,
                admin_email: "hi.poponew@gmail.com"
            };

            
            // 4. 最後執行 EmailJS 發信，並觸發同步 Google 表單
            emailjs.send('service_urrdjuh', 'template_tlon58x', templateParams)
                .then(function() {
                    // 信件發送成功後，默默將資料丟進 Google 表單 (試算表)
                    sendToGoogleSheets(templateParams);
                }, function(error) {
                    console.error("EmailJS發送失敗:", error);
                    // 萬一遇到連線問題，依然強制寫入 Google 試算表，確保老闆不漏單！
                    sendToGoogleSheets(templateParams);
                });
        }

        // 🚀 這是全自動對應生成的雲端同步函數
        function sendToGoogleSheets(params) {
            const googleFormUrl = "https://docs.google.com/forms/d/e/1FAIpQLSex6ZXlvNjmjhrNJH7AB_hyyUX1w1CDylyjOZM3dpLCbXbnmw/formResponse";
            const formData = new URLSearchParams();
            
            formData.append('entry.1353126753', "POPO-" + Date.now());
            formData.append('entry.1820251743', new Date().toLocaleString('zh-TW'));
            formData.append('entry.491047557', params.customer_name);
            formData.append('entry.196944971', params.customer_phone);
            formData.append('entry.1089190487', params.customer_email);
            formData.append('entry.1957110348', params.payment_method);
            formData.append('entry.2020657237', params.account_last_five);
            formData.append('entry.392182558', params.customer_address);
            formData.append('entry.1700894053', params.order_details);
            formData.append('entry.1181000171', params.total_price);
            formData.append('entry.2002660721', params.customer_note);

            fetch(googleFormUrl, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            })
            .then(() => {
                console.log("成功同步至 Google 試算表！");
                document.getElementById('custom-alert-modal').classList.remove('hidden');
                localStorage.removeItem('poponew_cart');
            })
            .catch((error) => {
                console.error("同步至 Google 失敗:", error);
                document.getElementById('custom-alert-modal').classList.remove('hidden');
                localStorage.removeItem('poponew_cart');
            });
        }
        // 點擊我知道了，關閉彈出視窗並回首頁
        function closeModalAndGoHome() {
            document.getElementById('custom-alert-modal').classList.add('hidden');
            window.location.href = 'index.html';
        }

        // 執行初始化
        initTwZipcode();
        renderCart();
    </script>

            <h3 class="text-lg font-bold text-stone-800 mb-2">您的訂單已成功送出！</h3>
            <p class="text-stone-500 text-sm leading-relaxed mb-5">
                感謝您的訂購。<br>
                💡 您的訂單郵件已寄出，如果沒收到訂購 email，請記得到<span class="text-red-500 font-extrabold text-base mx-0.5 underline decoration-2">垃圾郵件</span>看看唷！
            </p>
            <button onclick="closeModalAndGoHome()" class="w-full h-11 bg-amber-700 hover:bg-amber-800 text-white font-medium rounded-xl transition shadow-md text-sm active:scale-95">

            </button>
        </div>
    </div>
