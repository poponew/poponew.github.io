<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泡泡牛甜點 - 全功能本機管理後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a29e; }
    </style>
</head>
<body class="bg-stone-100 text-stone-800 font-sans p-6 relative">

    <!-- 自訂提示訊息容器 -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-[60] flex flex-col gap-3 pointer-events-none"></div>

    <!-- 自訂確認視窗 Modal -->
    <div id="custom-confirm-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[70] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-sm w-full p-6 shadow-2xl border border-stone-100 transform scale-95 transition-all text-center">
            <div class="text-4xl mb-3">⚠️</div>
            <h3 class="text-lg font-bold text-stone-800 mb-2">確認操作</h3>
            <p id="confirm-text" class="text-stone-500 text-sm leading-relaxed mb-6"></p>
            <div class="flex gap-3">
                <button onclick="closeConfirm()" class="w-full h-10 bg-stone-100 hover:bg-stone-200 text-stone-600 font-medium rounded-xl transition">取消</button>
                <button onclick="executeConfirm()" class="w-full h-10 bg-amber-600 hover:bg-amber-700 text-white font-medium rounded-xl transition shadow-sm">確定</button>
            </div>
        </div>
    </div>

    <div class="max-w-5xl mx-auto space-y-6">
        <header class="bg-amber-800 text-white p-6 rounded-2xl shadow-md flex justify-between items-center flex-wrap gap-4">
            <div>
                <h1 class="text-2xl font-bold tracking-wider">🐄 泡泡牛甜點 - 全功能核心後台系統</h1>
                <p class="text-xs text-amber-200 mt-1">【全新版本】支援商品置頂、缺貨標籤、即時購物車記憶！</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-7 bg-white p-6 rounded-2xl shadow-sm border border-stone-200 flex flex-col h-[650px]">
                <div class="border-b border-stone-100 pb-3 mb-4 flex justify-between items-center">
                    <h2 class="text-base font-bold text-stone-800 flex items-center gap-1.5">📦 1. 管理現有品項 (置頂與排序)</h2>
                    <span class="text-xs bg-stone-100 text-stone-500 px-2 py-0.5 rounded-full" id="total-items-badge">共 10 項</span>
                </div>
                <div id="manage-list" class="flex-grow overflow-y-auto space-y-4 pr-1 text-sm"></div>
            </div>

            <div class="lg:col-span-5 bg-white p-6 rounded-2xl shadow-sm border border-stone-200 flex flex-col h-[650px] overflow-y-auto space-y-4">
                <h2 class="text-base font-bold text-stone-800 border-b border-stone-100 pb-3">✨ 2. 上架全新的商品分類</h2>
                
                <div class="space-y-3 text-sm">
                    <div>
                        <label class="block font-medium text-stone-600 mb-1">主要產品大類名稱</label>
                        <input type="text" id="new-group-name" placeholder="例如：常溫點心瑪德蓮" class="w-full px-3 py-2 border border-stone-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-500">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block font-medium text-stone-600 mb-1">網頁檔名</label>
                            <input type="text" id="new-group-url" placeholder="mdl.html" class="w-full px-3 py-2 border border-stone-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-500">
                        </div>
                        <div>
                            <label class="block font-medium text-stone-600 mb-1">首頁顯示起價</label>
                            <input type="text" id="new-group-display-price" placeholder="150 起" class="w-full px-3 py-2 border border-stone-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-500">
                        </div>
                    </div>
                    <div>
                        <label class="block font-medium text-stone-600 mb-1">產品照片檔名/網址</label>
                        <input type="text" id="new-group-img" placeholder="images/mdl.png" class="w-full px-3 py-2 border border-stone-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-500">
                    </div>
                    <div>
                        <label class="block font-medium text-stone-600 mb-1">產品文案介紹</label>
                        <textarea id="new-group-desc" rows="2" placeholder="產品的美味指南介紹..." class="w-full p-3 border border-stone-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-500"></textarea>
                    </div>

                    <div class="border-t border-stone-100 pt-3">
                        <div class="flex justify-between items-center mb-2">
                            <span class="font-bold text-amber-900 text-xs">新增此商品的規格選項：</span>
                            <button type="button" onclick="addSpecRow()" class="bg-stone-800 hover:bg-stone-900 text-white text-[11px] py-1 px-2 rounded transition">
                                ➕ 增加規格
                            </button>
                        </div>
                        <div id="specs-container" class="space-y-2">
                            <div class="spec-row bg-stone-50 p-2.5 rounded-xl border border-stone-200 flex items-center gap-2">
                                <input type="text" placeholder="規格" class="spec-label w-1/3 px-2 py-1 border rounded-lg text-xs focus:outline-none" value="綜合4入">
                                <input type="text" placeholder="克數" class="spec-weight w-16 px-2 py-1 border rounded-lg text-xs focus:outline-none" value="180g">
                                <input type="number" placeholder="價格" class="spec-price w-16 px-2 py-1 border rounded-lg text-xs focus:outline-none" value="150">
                                <input type="text" placeholder="備註" class="spec-note w-1/4 px-2 py-1 border rounded-lg text-xs focus:outline-none">
                                <button type="button" onclick="this.closest('.spec-row').remove()" class="text-red-400 hover:text-red-600 text-xs font-bold px-1">✕</button>
                            </div>
                        </div>
                    </div>

                    <div class="md:col-span-2 pt-2">
                        <button type="button" onclick="submitNewProductGroup()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-xl transition shadow-sm text-sm">
                            ✅ 確認將新品項併入管理清單
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-stone-800 text-stone-200 p-5 rounded-2xl shadow-sm border border-stone-700 grid grid-cols-1 md:grid-cols-2 gap-6 text-sm">
            <div>
                <h3 class="font-bold text-amber-400 flex items-center gap-1.5 mb-1">📥 備份匯出中心</h3>
                <p class="text-xs text-stone-400 mb-3">修改好價格後，下載備份檔存於電腦中，安全感加倍！</p>
                <button onclick="exportToCSV()" class="bg-amber-600 hover:bg-amber-700 text-white font-bold px-4 py-2 rounded-xl transition shadow-sm active:scale-95 text-xs">
                    💾 一鍵下載備份檔案 (poponew_backup.csv)
                </button>
            </div>
            <div class="border-t md:border-t-0 md:border-l border-stone-700 pt-4 md:pt-0 md:pl-6">
                <h3 class="font-bold text-emerald-400 flex items-center gap-1.5 mb-1">📤 備份匯入還原中心</h3>
                <p class="text-xs text-stone-400 mb-2">如果不小心清空了網頁資料，請選擇備份 CSV 檔，即可還原！</p>
                <div class="flex items-center gap-2 mt-2">
                    <input type="file" id="csv-file-input" accept=".csv" class="block w-full text-xs text-stone-400 file:mr-3 file:py-1.5 file:px-3 file:rounded-xl file:border-0 file:text-xs file:font-semibold file:bg-stone-700 file:text-stone-200 hover:file:bg-stone-600">
                    <button onclick="importFromCSV()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-4 py-2 rounded-xl transition shadow-sm shrink-0 text-xs active:scale-95">
                        ⚡ 執行還原匯入
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-amber-50 border border-amber-200 p-4 rounded-2xl flex justify-between items-center flex-wrap gap-4 shadow-sm">
            <div class="text-xs text-amber-800 flex items-center gap-3">
                <span><b>💡 貼心提醒：</b>修改完畢後，請點擊右側按鈕一鍵打包同步全站代碼！</span>
                <button onclick="askResetToDefault()" class="bg-red-100 hover:bg-red-200 text-red-700 border border-red-300 text-[10px] font-bold px-2 py-0.5 rounded transition whitespace-nowrap">重設原廠預設</button>
            </div>
            <button onclick="compileAllOutputs()" class="bg-amber-700 hover:bg-amber-800 text-white font-bold px-6 py-3 rounded-xl transition shadow-md text-base active:scale-95">
                🚀 點此一鍵生成「全站網頁代碼」
            </button>
        </div>

        <div id="output-area" class="space-y-6 hidden">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                <h3 class="text-base font-bold text-stone-800 border-b pb-2 mb-3 flex items-center gap-2">
                    <span class="bg-amber-700 text-white w-5 h-5 rounded-full inline-flex items-center justify-center text-xs">A</span>
                    更新你的結帳頁面 (cart.html)
                </h3>
                <textarea id="out-cart" rows="6" readonly class="w-full p-3 bg-stone-900 text-green-400 font-mono text-xs rounded-xl focus:outline-none"></textarea>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                <h3 class="text-base font-bold text-stone-800 border-b pb-2 mb-3 flex items-center gap-2">
                    <span class="bg-amber-700 text-white w-5 h-5 rounded-full inline-flex items-center justify-center text-xs">B</span>
                    更新你的官網首頁 (index.html)
                </h3>
                <textarea id="out-index" rows="6" readonly class="w-full p-3 bg-stone-900 text-blue-400 font-mono text-xs rounded-xl focus:outline-none"></textarea>
            </div>
            <div id="dynamic-pages-container" class="space-y-6"></div>
        </div>
    </div>

    <script>
        // 自訂 UI 系統 (Toast 與 Confirm Modal) 取代預設醜醜的 alert 與 confirm
        let currentConfirmAction = null;

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgClass = type === 'error' ? 'bg-red-600' : 'bg-stone-800';
            toast.className = `${bgClass} text-white px-4 py-3 rounded-xl shadow-xl text-sm font-medium transform transition-all duration-300 opacity-0 translate-y-4 flex items-center gap-2`;
            toast.innerHTML = type === 'error' ? `❌ ${message}` : `✅ ${message}`;
            container.appendChild(toast);
            
            setTimeout(() => toast.classList.remove('opacity-0', 'translate-y-4'), 10);
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-4');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function showConfirm(message, actionCallback) {
            document.getElementById('confirm-text').innerText = message;
            document.getElementById('custom-confirm-modal').classList.remove('hidden');
            currentConfirmAction = actionCallback;
        }

        function closeConfirm() {
            document.getElementById('custom-confirm-modal').classList.add('hidden');
            setTimeout(() => {
                document.getElementById('custom-confirm-modal').classList.add('hidden');
            }, 10);
            currentConfirmAction = null;
        }

        function executeConfirm() {
            if (currentConfirmAction) currentConfirmAction();
            closeConfirm();
        }

        // 預設產品資料庫
        const defaultProducts = [
            { id: 1, group: "美式軟餅乾系列", url: "msbg.html", name: "經典核桃美式軟餅乾", weight: "120g", price: 100, note: "" },
            { id: 2, group: "美式軟餅乾系列", url: "msbg.html", name: "草莓棉花糖核桃巧克力軟餅乾", weight: "120g", price: 125, note: "" },
            { id: 3, group: "美式軟餅乾系列", url: "msbg.html", name: "杏仁片棉花糖苦甜巧克力", weight: "120g", price: 125, note: "" },
            { id: 4, group: "美式軟餅乾系列", url: "msbg.html", name: "Oreo 碎片棉花糖巧克力", weight: "120g", price: 125, note: "" },
            { id: 5, group: "美式軟餅乾系列", url: "msbg.html", name: "醇黑榛果巧克力", weight: "120g", price: 110, note: "" },
            { id: 6, group: "美式軟餅乾系列", url: "msbg.html", name: "柑橘奶酪", weight: "160g", price: 130, note: "" },
            { id: 7, group: "美式軟餅乾系列", url: "msbg.html", name: "經典Oreo奶酪", weight: "160g", price: 130, note: "" },
            { id: 8, group: "美式軟餅乾系列", url: "msbg.html", name: "酸甜綜合莓果奶酪", weight: "160g", price: 130, note: "" },
            { id: 9, group: "抹茶柚子巴斯克", url: "mcyobsk.html", name: "抹茶柚子巴斯克蛋糕 (4吋切片)", weight: "120g", price: 140, note: "" },
            { id: 10, group: "抹茶柚子巴斯克", url: "mcyobsk.html", name: "抹茶柚子巴斯克蛋糕 (6吋整顆)", weight: "500g", price: 680, note: "需5~7天出貨" }
        ];

        const defaultGroups = [
            { id: "group-1", name: "美式軟餅乾系列", price: "100 起", img: "images/msbg.png", desc: "如果說法式甜點是精雕細琢的藝術品，那麼美式軟餅乾，就是生活中最溫暖厚實的擁抱。<br/>​我們以此為靈感，悉心復刻了紐約 Levain Bakery 的代表作 — Chocolate Chip Walnut Cookie。<br/>巧克力的微苦與核桃的溫潤堅果香，向來是烘焙界無需多言的絕配。在厚實、不規則的外表下，藏著極致的外酥內軟。<br/>​​微微加熱後，流淌的巧克力流心讓人驚豔；而冷藏過後的緊實風味，同樣出眾。沒有繁複的裝飾，只有純粹的美味。在每一個需要被撫慰的日常瞬間，為你補充最滿的能量。", url: "msbg.html", isPinned: false },
            { id: "group-2", name: "抹茶柚子巴斯克", price: "140 起", img: "images/mcyobsk.png", desc: "悶熱的夏天需要一點清爽的溫柔。<br/>抹​茶柚子巴斯克<br/>​抹茶的微苦，遇上柚子的清甜，在舌尖優雅地化開。<br/>獨特的軟心質地，綿密順滑如雲朵般細緻。<br/>​每一口，都是剛剛好的甜，和撫平浮躁的高級大人味。", url: "mcyobsk.html", isPinned: false }
        ];

        let globalProducts = JSON.parse(localStorage.getItem('poponew_admin_products')) || defaultProducts;
        let globalGroups = JSON.parse(localStorage.getItem('poponew_admin_groups')) || defaultGroups;
        let expandedGroups = {};

        // 舊資料轉移防呆
        globalProducts.forEach(p => { if (p.group === "抹茶柚子巴斯克蛋糕") { p.group = "抹茶柚子巴斯克"; } });
        globalGroups.forEach(g => { if (g.name === "抹茶柚子巴斯克蛋糕") { g.name = "抹茶柚子巴斯克"; } });
        saveToDatabase();

        function saveToDatabase() {
            localStorage.setItem('poponew_admin_products', JSON.stringify(globalProducts));
            localStorage.setItem('poponew_admin_groups', JSON.stringify(globalGroups));
        }

        function askResetToDefault() {
            showConfirm("確定要重設回原廠初始資料嗎？這將會覆蓋您自訂的商品設定。", () => {
                localStorage.removeItem('poponew_admin_products');
                localStorage.removeItem('poponew_admin_groups');
                globalProducts = [...defaultProducts];
                globalGroups = [...defaultGroups];
                renderManageList(); compileAllOutputs();
                showToast("已重設完畢。");
            });
        }

        function renderManageList() {
            const container = document.getElementById('manage-list'); container.innerHTML = '';
            
            // 排序邏輯：置頂的放前面，沒置頂的放後面
            globalGroups.sort((a, b) => {
                let pA = a.isPinned || false;
                let pB = b.isPinned || false;
                if (pA === pB) return 0;
                return pA ? -1 : 1;
            });
            
            document.getElementById('total-items-badge').innerText = `共 ${globalProducts.length} 項`;

            globalGroups.forEach((group, gIndex) => {
                const groupName = group.name; 
                const isPinned = group.isPinned || false;
                const isExpanded = expandedGroups[groupName] || false; 
                const subItems = globalProducts.filter(p => p.group === groupName);
                
                const groupWrapper = document.createElement('div');
                // 若置頂，邊框加深並加微弱背景色標示
                groupWrapper.className = `border rounded-2xl overflow-hidden transition duration-200 ${isPinned ? 'bg-indigo-50/30 border-indigo-200 shadow-sm' : 'bg-stone-50 border-stone-200 shadow-sm'}`;

                const headerBar = document.createElement('div');
                headerBar.className = "px-4 py-3 flex justify-between items-center cursor-pointer select-none";
                headerBar.setAttribute('onclick', `toggleGroupExpand("${groupName.replace(/"/g, '&quot;')}")`);
                
                // 改版 UI：移除「隱藏」，換成「置頂」，箭頭文字移除只留圖示
                headerBar.innerHTML = `
                    <div class="flex items-center gap-2 flex-wrap flex-grow mr-2" onclick="event.stopPropagation();">
                        <span class="text-stone-500 font-mono text-xs font-bold bg-stone-300/80 px-2 py-0.5 rounded-md">${gIndex + 1}</span>
                        <input type="text" value="${groupName}" onchange="updateGroupName('${group.id}', this.value)" class="px-2 py-1 text-sm border rounded font-bold text-stone-800 bg-white border-stone-300 focus:outline-none focus:ring-1 focus:ring-amber-500 max-w-[140px] md:max-w-[180px]">
                        <div class="flex items-center gap-0.5 text-xs text-stone-500">
                            <span>首頁價:</span>
                            <input type="text" value="${group.price}" onchange="updateGroupPrice('${group.id}', this.value)" class="w-16 px-1.5 py-0.5 border rounded text-center font-bold text-amber-700 bg-white border-stone-300 focus:outline-none focus:ring-1 focus:ring-amber-500">
                        </div>
                        <span class="text-xs bg-stone-200 text-stone-600 px-2 py-0.5 rounded-full font-medium">共 ${subItems.length} 款</span>
                        ${isPinned ? '<span class="text-[10px] bg-indigo-100 text-indigo-600 border border-indigo-200 px-1.5 py-0.5 rounded font-bold ml-1">📌 已置頂</span>' : ''}
                    </div>
                    <div class="flex items-center gap-2.5 shrink-0" onclick="event.stopPropagation();">
                        <button type="button" onclick="toggleGroupPin('${group.id}')" class="text-[11px] font-bold px-2.5 py-1 rounded border transition ${isPinned ? 'bg-indigo-50 border-indigo-200 text-indigo-700 hover:bg-indigo-100' : 'bg-white border-stone-300 text-stone-600 hover:bg-stone-100'}">置頂</button>
                        <button type="button" onclick="askDeleteEntireGroup('${group.id}', '${groupName}')" class="bg-red-50 hover:bg-red-100 border border-red-200 text-red-600 px-1.5 py-1 rounded text-xs transition font-medium">🗑️</button>
                        <span class="text-stone-400 hover:text-amber-600 font-bold text-xs ml-1 cursor-pointer w-4 text-center" onclick="event.stopPropagation(); toggleGroupExpand('${groupName.replace(/'/g, "\\'")}')">${isExpanded ? '▼' : '▶'}</span>
                    </div>
                `;
                groupWrapper.appendChild(headerBar);

                if (isExpanded) {
                    const itemsContainer = document.createElement('div'); itemsContainer.className = "p-3 space-y-3 bg-white border-t border-stone-200/60";
                    subItems.forEach((product) => {
                        const row = document.createElement('div');
                        row.className = "p-3 bg-stone-50/60 rounded-xl border border-stone-200 space-y-2 hover:border-amber-300 transition text-xs";
                        row.innerHTML = `
                            <div class="flex items-center justify-between">
                                <span class="text-[10px] font-mono font-bold text-stone-400 bg-stone-200 px-1.5 py-0.5 rounded">ID: ${product.id}</span>
                                <button type="button" onclick="askDeleteProduct(${product.id})" class="text-[11px] text-red-400 hover:text-red-600 font-medium">✕ 移除口味</button>
                            </div>
                            <div class="grid grid-cols-12 gap-2 items-center">
                                <div class="col-span-5">
                                    <input type="text" value="${product.name}" onchange="updateProductField(${product.id}, 'name', this.value)" class="w-full px-2 py-1 border rounded text-xs text-stone-800 font-medium bg-white border-stone-300 focus:outline-none focus:ring-1 focus:ring-amber-500">
                                </div>
                                <div class="col-span-2 flex items-center gap-0.5">
                                    <span class="text-[10px] text-stone-400">約</span>
                                    <input type="text" value="${product.weight || '120g'}" onchange="updateProductField(${product.id}, 'weight', this.value)" class="w-full px-1 py-1 border rounded text-xs text-center focus:outline-none">
                                </div>
                                <div class="col-span-2 flex items-center gap-0.5">
                                    <span class="text-[10px] text-stone-400">$</span>
                                    <input type="number" value="${product.price}" onchange="updateProductField(${product.id}, 'price', this.value)" class="w-full px-1 py-1 border rounded text-xs text-center font-bold text-amber-700 focus:outline-none">
                                </div>
                                <div class="col-span-3 flex items-center gap-0.5 relative group">
                                    <span class="text-[10px] text-stone-400">註:</span>
                                    <input type="text" value="${product.note || ''}" placeholder="如:缺貨" onchange="updateProductField(${product.id}, 'note', this.value)" class="w-full px-1.5 py-1 border rounded text-xs bg-amber-50/50 text-amber-800 border-stone-300 focus:outline-none focus:ring-1 focus:ring-amber-500">
                                    <!-- 缺貨提示窗 -->
                                    <div class="absolute -top-8 right-0 bg-stone-800 text-white text-[10px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 pointer-events-none transition whitespace-nowrap">打上「缺貨」可自動鎖定加購</div>
                                </div>
                            </div>
                        `;
                        itemsContainer.appendChild(row);
                    });
                    groupWrapper.appendChild(itemsContainer);
                }
                container.appendChild(groupWrapper);
            });
        }

        function updateGroupPrice(groupId, newPrice) {
            let group = globalGroups.find(g => g.id === groupId); if (group) { group.price = newPrice; saveToDatabase(); compileAllOutputs(); }
        }

        function updateGroupName(groupId, newName) {
            let group = globalGroups.find(g => g.id === groupId);
            if (group) {
                let oldName = group.name; group.name = newName;
                globalProducts.forEach(p => { if (p.group === oldName) { p.group = newName; } });
                saveToDatabase(); renderManageList(); compileAllOutputs();
            }
        }

        function toggleGroupExpand(groupName) { expandedGroups[groupName] = !expandedGroups[groupName]; renderManageList(); }
        
        function toggleGroupPin(groupId) { 
            let group = globalGroups.find(g => g.id === groupId); 
            if (group) { 
                group.isPinned = !group.isPinned; 
                saveToDatabase(); 
                renderManageList(); 
                compileAllOutputs(); 
            } 
        }

        function askDeleteEntireGroup(groupId, groupName) { 
            showConfirm(`⚠️ 確定要永久刪除「${groupName}」大項嗎？\n如果您已經不再販售，刪除後建議也要手動清除電腦裡對應的 HTML 檔案喔！`, () => {
                globalGroups = globalGroups.filter(g => g.id !== groupId); 
                globalProducts = globalProducts.filter(p => p.group !== groupName); 
                saveToDatabase(); 
                renderManageList(); 
                compileAllOutputs();
                showToast("已刪除該大項分類！");
            });
        }

        function updateProductField(id, field, value) {
            let item = globalProducts.find(p => p.id === id);
            if (item) {
                if (field === 'price') { item[field] = parseInt(value) || 0; } else { item[field] = value; }
                saveToDatabase(); compileAllOutputs();
            }
        }

        function askDeleteProduct(id) { 
            showConfirm("確定要將此規格/口味移除嗎？", () => {
                globalProducts = globalProducts.filter(p => p.id !== id); 
                saveToDatabase(); 
                renderManageList(); 
                compileAllOutputs(); 
                showToast("已移除該口味！");
            });
        }

        function addSpecRow() {
            const container = document.getElementById('specs-container'); const newRow = document.createElement('div');
            newRow.className = "spec-row bg-stone-50 p-2.5 rounded-xl border border-stone-200 flex items-center gap-2";
            newRow.innerHTML = `<input type="text" placeholder="規格" class="spec-label w-1/3 px-2 py-1 border rounded-lg text-xs focus:outline-none"><input type="text" placeholder="克數" class="spec-weight w-16 px-2 py-1 border rounded-lg text-xs focus:outline-none" value="120g"><input type="number" placeholder="價格" class="spec-price w-16 px-2 py-1 border rounded-lg text-xs focus:outline-none"><input type="text" placeholder="備註(選填)" class="spec-note w-1/4 px-2 py-1 border rounded-lg text-xs focus:outline-none"><button type="button" onclick="this.closest('.spec-row').remove()" class="text-red-400 hover:text-red-600 text-xs font-bold px-1">✕</button>`;
            container.appendChild(newRow);
        }

        function submitNewProductGroup() {
            const groupName = document.getElementById('new-group-name').value.trim(); let url = document.getElementById('new-group-url').value.trim();
            const displayPrice = document.getElementById('new-group-display-price').value.trim(); const img = document.getElementById('new-group-img').value.trim(); const desc = document.getElementById('new-group-desc').value.trim();
            if (!groupName || !url) { showToast("請填寫大類名稱與對應網頁檔名！", "error"); return; }
            if (!url.toLowerCase().endsWith('.html')) { url = url + '.html'; }
            const specRows = document.querySelectorAll('.spec-row'); if (specRows.length === 0) { showToast("請至少建立一種規格選項！", "error"); return; }
            let maxId = globalProducts.reduce((max, p) => p.id > max ? p.id : max, 0); let nextId = maxId + 1;
            specRows.forEach(row => {
                const specLabel = row.querySelector('.spec-label').value.trim(); const specWeight = row.querySelector('.spec-weight').value.trim() || "120g";
                const specPrice = parseInt(row.querySelector('.spec-price').value) || 0; const specNote = row.querySelector('.spec-note').value.trim() || "";
                const fullName = `${groupName} (${specLabel})`;
                globalProducts.push({ id: nextId, group: groupName, url: url, name: fullName, weight: specWeight, price: specPrice, note: specNote }); nextId++;
            });
            globalGroups.push({ id: "group-" + (globalGroups.length + 1), name: groupName, price: displayPrice || "220 起", img: img || "images/basque.png", desc: desc || "", url: url, isPinned: false });
            expandedGroups[groupName] = true; 
            
            showToast(`🎉 成功！已將新分類「${groupName}」併入管理清單中`);
            document.getElementById('new-group-name').value = ''; document.getElementById('new-group-url').value = ''; document.getElementById('new-group-desc').value = '';
            saveToDatabase(); renderManageList(); compileAllOutputs();
        }

        function exportToCSV() {
            let csvRows = [];
            csvRows.push('\uFEFFtype,id,group_name,url,name,weight,price,note,img,desc,isPinned');
            globalGroups.forEach(g => {
                let cleanDesc = (g.desc || '').replace(/"/g, '""');
                csvRows.push(`group,${g.id},"${g.name}",${g.url},,,"${g.price}",,${g.img},"${cleanDesc}",${g.isPinned || false}`);
            });
            globalProducts.forEach(p => {
                csvRows.push(`product,${p.id},"${p.group}",${p.url},"${p.name}","${p.weight}",${p.price},"${p.note || ''}",,,`);
            });
            let csvString = csvRows.join('\n');
            let blob = new Blob([csvString], { type: 'text/csv;charset=utf-8;' });
            let link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", "poponew_backup.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showToast("已下載備份檔案！");
        }

        function importFromCSV() {
            const fileInput = document.getElementById('csv-file-input');
            const file = fileInput.files[0];
            if (!file) { showToast("請先選取您電腦裡的 poponew_backup.csv 備份檔案！", "error"); return; }
            const reader = new FileReader();
            reader.onload = function (e) {
                const text = e.target.result; const lines = text.split('\n');
                let newGroups = []; let newProducts = [];
                for (let i = 1; i < lines.length; i++) {
                    let line = lines[i].trim(); if (!line) continue;
                    let matches = line.match(/(".*?"|[^,]+|(Meta(?=,)))/g);
                    if (!matches) { matches = line.split(',').map(p => p.trim()); }
                    let parts = matches.map(p => p.replace(/^"|"$/g, '').replace(/""/g, '"').trim());
                    let type = parts[0];
                    if (type === 'group') {
                        // 讀取 isPinned，支援相容舊版的備份結構
                        newGroups.push({ id: parts[1], name: parts[2], url: parts[3], price: parts[6], img: parts[8], desc: parts[9] || '', isPinned: parts[10] === 'true' });
                    } else if (type === 'product') {
                        newProducts.push({ id: parseInt(parts[1]), group: parts[2], url: parts[3], name: parts[4], weight: parts[5], price: parseInt(parts[6]) || 0, note: parts[7] || '' });
                    }
                }
                globalGroups = newGroups; globalProducts = newProducts;
                saveToDatabase(); renderManageList(); compileAllOutputs();
                showToast("🎉 成功還原資料！");
                fileInput.value = ''; // clear
            };
            reader.readAsText(file);
        }

            h.push('        <div class="w-full min-w-full aspect-square flex items-center justify-center bg-stone-100 shrink-0 relative overflow-hidden">');

            h.push('            <div class="bg-amber-50 rounded-2xl p-4 border border-amber-100 flex justify-between items-center flex-wrap gap-4 shadow-sm">');
            h.push('                <div class="flex flex-col">');

            h.push('                </div>');
            h.push('                <button onclick="saveToCartAndGo()" class="h-12 px-6 bg-amber-700 hover:bg-amber-800 text-white font-medium rounded-xl transition shadow-md flex items-center justify-center gap-1 active:scale-95 text-xm h-auto md:h-12">前往結帳</button>');
            h.push('            </div>');
            h.push('        <\/div>');
            h.push('    <\/div>');

            h.push('    <script>');
            h.push('        var cart = JSON.parse(localStorage.getItem("poponew_cart")) || {};');
            h.push('        var container = document.getElementById("cookie-list");');
            h.push('        window.products.forEach(function(p) {');
            h.push('            var currentQty = cart[p.id] || 0;');
            h.push('            var itemDiv = document.createElement("div");');
            h.push('            itemDiv.className = "flex items-center justify-between p-4 bg-stone-50 rounded-xl border border-stone-200 hover:border-amber-200 transition";');
            h.push('            var noteHtml = p.note ? " <span class=\'text-xs text-amber-600 font-semibold bg-amber-100/60 px-1.5 py-0.5 rounded-md ml-1\'>" + p.note + "<\\/span>" : "";');
            
            // 加入缺貨與售完自動判定，並替換為按鈕鎖定的畫面
h.push('            var isOutOfStock = (p.note && (p.note.indexOf("缺貨") !== -1 || p.note.indexOf("售完") !== -1));');
            h.push('            var actionHtml = isOutOfStock ? "<span class=\'text-sm font-bold text-stone-400 bg-stone-100 px-3 py-1.5 rounded-lg border border-stone-200 shadow-inner\'>🚫 已售完<\\/span>" : "<div class=\'flex items-center gap-3\'><button type=\'button\' onclick=\'updateQty(" + p.id + ", -1)\' class=\'w-8 h-8 rounded-lg border bg-white flex items-center justify-center font-bold shadow-sm\'>-<\\/button><input type=\'number\' id=\'qty-" + p.id + "\' value=\'" + currentQty + "\' min=\'0\' readonly class=\'w-6 text-center bg-transparent font-bold\'><button type=\'button\' onclick=\'updateQty(" + p.id + ", 1)\' class=\'w-8 h-8 rounded-lg border bg-white flex items-center justify-center font-bold shadow-sm\'>+<\\/button><\\/div>";');
            // 改版：將商品名稱抽出來放最上面，下方區塊做彈性佈局，使圖片、克數、價格能垂直靠左排列
            h.push('            itemDiv.className = "p-4 bg-stone-50 rounded-xl border border-stone-200 hover:border-amber-200 transition space-y-2";');
            h.push('            itemDiv.innerHTML = "<h3 class=\'font-medium text-stone-800 text-sm w-full\'>" + p.name + noteHtml + "</h3><div class=\'flex justify-between items-end w-full\'><div class=\'flex gap-3 items-center\' id=\'product-info-left-" + p.id + "\'><div><p class=\'text-xs text-stone-400\'>約 " + p.weight + "</p><p class=\'text-sm text-amber-700 font-semibold mt-0.5\'>NT$ " + p.price + "</p></div></div>" + actionHtml + "</div>";');

            h.push('        function calculatePageTotal() { var entireCartTotal = 0; for (var id in cart) { entireCartTotal += (window.allProductsLookup[id] || 0) * cart[id]; } document.getElementById("entire-cart-total").innerText = entireCartTotal; var tipElement = document.getElementById("free-shipping-tip"); if (entireCartTotal === 0) { tipElement.innerText = "⚠️ 本商店最低結帳金額為 NT$ 500 元唷！"; } else if (entireCartTotal >= 2000) { tipElement.innerHTML = "<span class=\'text-green-600 font-bold text-sm\'>🎉 全店已達免運費門檻！直接結帳超划算！</' + 'span>"; } else { tipElement.innerText = "還差" + (2000 - entireCartTotal) + " 元就免運啦！"; } }');        
            
            // 這裡也客製化取代了預設的 alert
            h.push('        function saveToCartAndGo() { var entireCartTotal = 0; for (var id in cart) { entireCartTotal += (window.allProductsLookup[id] || 0) * cart[id]; } if (entireCartTotal === 0) { alert("您目前尚未選擇任何數量唷！"); return; } if (entireCartTotal < 500) { alert("抱歉！本商店最低結帳金額為 NT$ 500 元，目前綜合累計為 NT$ " + entireCartTotal + " 元，請再多選購一些甜點唷！"); return; } localStorage.setItem("poponew_cart", JSON.stringify(cart)); window.location.href = "cart.html"; }');

h.push('                imgTester.onload = function() {');

        function compileAllOutputs() {
            // 因為拔除了隱藏功能，所以所有商品皆納入
            let activeGroupsNames = globalGroups.map(g => g.name);
            
            // A. 購物車對照表
            let cartString = "const productsLookup = {\n";
            globalProducts.forEach(p => { 
                if (activeGroupsNames.includes(p.group)) { 
                    cartString += `            "${p.id}": { name: "${p.name}", weight: "${p.weight || '120g'}", price: ${p.price} },\n`; 
                } 
            });
            cartString += "        };"; document.getElementById('out-cart').value = cartString;

            // B. 首頁
            let indexString = "const products = [\n";
            globalGroups.forEach(g => { 
                indexString += `    {\n        id: "${g.id}",\n        name: "${g.name}",\n        price: "${g.price}",\n        img: "${g.img}",\n        desc: "${g.desc}",\n        url: "${g.url}"\n    },\n`; 
            });
            indexString += "];"; document.getElementById('out-index').value = indexString;
            
            // C. 動態分頁
            const dynContainer = document.getElementById('dynamic-pages-container');
            dynContainer.innerHTML = '';
            
            globalGroups.forEach((g, idx) => {
                let subItems = globalProducts.filter(p => p.group === g.name);
                let pageCode = buildSinglePageText(g.name, g.url, g.img, g.desc, subItems);
                
                let section = document.createElement('div');
                section.className = "bg-white p-6 rounded-2xl shadow-sm border border-stone-200";
                section.innerHTML = `
                    <h3 class="text-base font-bold text-stone-800 border-b pb-2 mb-3 flex items-center gap-2">
                        <span class="bg-amber-700 text-white w-5 h-5 rounded-full inline-flex items-center justify-center text-xs">${String.fromCharCode(67 + idx)}</span>
                        更新【${g.name}】的分頁網頁代碼 (${g.url})
                    </h3>
                    <p class="text-xs text-stone-500 mb-2">請複製下方完整代碼，貼進你的 <b>${g.url}</b> 檔案中覆蓋儲存。</p>
                    <textarea rows="8" readonly class="w-full p-3 bg-stone-900 text-amber-400 font-mono text-xs rounded-xl focus:outline-none"></textarea>
                `;
                section.querySelector('textarea').value = pageCode;
                dynContainer.appendChild(section);
            });
            
            document.getElementById('output-area').classList.remove('hidden');
            showToast("全站網頁代碼已成功生成！", "success");
            
            // 自動滾動到底部
            setTimeout(() => {
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 100);
        }

        renderManageList();
